name: waymark

services:
  postgres:
    image: postgres:18
    container_name: waymark-postgres
    environment:
      POSTGRES_DB: waymark
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "${WAYMARK_POSTGRES_PORT:-5433}:5432"
    volumes:
      - waymark_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d waymark"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  waymark_postgres_data:
