[phases.setup]
nixPkgs = ['nodejs_24', 'nodePackages.pnpm']
cmds = ['corepack enable']

[phases.install]
cmds = ['pnpm install --frozen-lockfile']

[phases.build]
cmds = ["printf '%s\\n' 'DATABASE_URL=postgresql://build:build@localhost:5432/build' 'BETTER_AUTH_SECRET=build-only-secret-012345678901234567890123456789' 'BETTER_AUTH_URL=https://build.invalid' 'CORS_ORIGIN=https://build.invalid' 'GOOGLE_CLIENT_ID=build-only-client' 'GOOGLE_CLIENT_SECRET=build-only-secret' > apps/web/.env && pnpm run build && rm apps/web/.env"]

[start]
cmd = 'pnpm --filter web start'
